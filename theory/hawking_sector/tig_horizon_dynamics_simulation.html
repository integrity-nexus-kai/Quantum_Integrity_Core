<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TIG Horizon Dynamics Simulation</title>
<style>
  body {
    margin: 0;
    background: #050505;
    color: #00ffcc;
    font-family: "Courier New", monospace;
    overflow: hidden;
  }
  canvas {
    display: block;
  }
  #panel {
    position: absolute;
    top: 20px;
    left: 20px;
    width: 360px;
    padding: 18px;
    background: rgba(0, 20, 20, 0.85);
    border: 1px solid #00ffcc;
    border-radius: 10px;
    box-shadow: 0 0 18px rgba(0,255,204,0.35);
  }
  h1 {
    font-size: 18px;
    margin: 0 0 8px 0;
  }
  .small {
    font-size: 12px;
    color: #aaffee;
    line-height: 1.45;
  }
  .metric {
    margin-top: 8px;
    font-size: 13px;
  }
  .warning {
    margin-top: 12px;
    font-size: 11px;
    color: #ffaa88;
  }
</style>
</head>
<body>

<canvas id="sim"></canvas>

<div id="panel">
  <h1>TIG Horizon Dynamics</h1>
  <div class="small">Heuristic near-critical horizon simulation</div>

  <div class="metric">β: <span id="beta"></span></div>
  <div class="metric">βc: <span id="betac"></span></div>
  <div class="metric">x(t): <span id="xval"></span></div>
  <div class="metric">κ_eff: <span id="kappa"></span></div>
  <div class="metric">T_eff: <span id="temp"></span></div>
  <div class="metric">Relaxation τ: <span id="tau"></span></div>

  <div class="warning">
    Status: heuristic / exploratory / non-rigorous.<br>
    Not a numerical relativity simulation.
  </div>
</div>

<script>
const canvas = document.getElementById("sim");
const ctx = canvas.getContext("2d");

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

const betaC = Math.pow(4 / 27, 1 / 3);
let t = 0;

function structuralEquation(x, beta) {
  return x*x*x - x*x + beta*beta*beta;
}

function potentialGradient(x, beta) {
  const f = structuralEquation(x, beta);
  const df = 3*x*x - 2*x;
  return f * df;
}

let x = 1.0;
let beta = 0.05;

function updateDynamics() {
  t += 0.012;

  beta = 0.05 + (betaC - 0.055) * (0.5 + 0.5 * Math.sin(t * 0.08));

  const criticalDistance = Math.max(0.002, Math.abs(betaC - beta));
  const tau = 1 / Math.pow(criticalDistance, 0.55);

  const gamma = 0.002 / tau;
  const echo = 0.0025 * Math.sin(t * 3.0) * Math.exp(-criticalDistance * 8);

  x -= gamma * potentialGradient(x, beta);
  x += echo;

  x = Math.max(0.25, Math.min(1.15, x));

  const Fbeta = Math.max(0, 1 - Math.pow(beta / betaC, 2));
  const kappa = 0.25 * Fbeta;
  const temp = kappa / (2 * Math.PI);

  return { tau, kappa, temp, criticalDistance };
}

function drawGrid(cx, cy, radius, beta, x) {
  ctx.strokeStyle = "rgba(0,255,204,0.16)";
  ctx.lineWidth = 1;

  const gridSize = 32;
  const distortion = 80 * (beta / betaC) + 25 * Math.sin(t * 2);

  for (let i = -20; i <= 20; i++) {
    ctx.beginPath();
    for (let j = -20; j <= 20; j++) {
      let px = cx + i * gridSize;
      let py = cy + j * gridSize;

      const dx = px - cx;
      const dy = py - cy;
      const d = Math.sqrt(dx*dx + dy*dy) + 1;

      const pull = distortion * Math.exp(-d / 260);
      px -= (dx / d) * pull;
      py -= (dy / d) * pull;

      if (j === -20) ctx.moveTo(px, py);
      else ctx.lineTo(px, py);
    }
    ctx.stroke();
  }

  for (let j = -20; j <= 20; j++) {
    ctx.beginPath();
    for (let i = -20; i <= 20; i++) {
      let px = cx + i * gridSize;
      let py = cy + j * gridSize;

      const dx = px - cx;
      const dy = py - cy;
      const d = Math.sqrt(dx*dx + dy*dy) + 1;

      const pull = distortion * Math.exp(-d / 260);
      px -= (dx / d) * pull;
      py -= (dy / d) * pull;

      if (i === -20) ctx.moveTo(px, py);
      else ctx.lineTo(px, py);
    }
    ctx.stroke();
  }
}

function drawHorizon(cx, cy, r, criticalDistance) {
  const pulse = 1 + 0.035 * Math.sin(t * 5) * (1 / (1 + criticalDistance * 20));
  const rr = r * pulse;

  ctx.beginPath();
  ctx.arc(cx, cy, rr, 0, Math.PI * 2);
  ctx.strokeStyle = "#00ffcc";
  ctx.lineWidth = 3;
  ctx.shadowBlur = 18;
  ctx.shadowColor = "#00ffcc";
  ctx.stroke();
  ctx.shadowBlur = 0;

  ctx.beginPath();
  ctx.arc(cx, cy, rr * 0.68, 0, Math.PI * 2);
  ctx.strokeStyle = "rgba(0,255,204,0.35)";
  ctx.lineWidth = 1;
  ctx.stroke();

  for (let i = 0; i < 8; i++) {
    const a = t * 0.8 + i * Math.PI / 4;
    const ex = cx + Math.cos(a) * rr * (1.18 + 0.06 * Math.sin(t + i));
    const ey = cy + Math.sin(a) * rr * (1.18 + 0.06 * Math.cos(t + i));

    ctx.beginPath();
    ctx.arc(ex, ey, 3, 0, Math.PI * 2);
    ctx.fillStyle = "#00ffcc";
    ctx.fill();
  }
}

function animate() {
  const state = updateDynamics();

  ctx.fillStyle = "rgba(5,5,5,0.25)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  const cx = canvas.width * 0.58;
  const cy = canvas.height * 0.52;

  const horizonRadius = 140 * x;

  drawGrid(cx, cy, horizonRadius, beta, x);
  drawHorizon(cx, cy, horizonRadius, state.criticalDistance);

  ctx.fillStyle = "#00ffcc";
  ctx.font = "13px Courier New";
  ctx.fillText("critical TIG horizon state", cx - 105, cy - horizonRadius - 22);
  ctx.fillText("structural relaxation field", cx - 130, cy + horizonRadius + 35);

  document.getElementById("beta").textContent = beta.toFixed(5);
  document.getElementById("betac").textContent = betaC.toFixed(5);
  document.getElementById("xval").textContent = x.toFixed(5);
  document.getElementById("kappa").textContent = state.kappa.toFixed(6);
  document.getElementById("temp").textContent = state.temp.toFixed(6);
  document.getElementById("tau").textContent = state.tau.toFixed(2);

  requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
